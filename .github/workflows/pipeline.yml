name: Desafio Pipeline Uniesp

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ETAPA 1: O GUARDIÃO - Build e Testes
  commit-stage:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    
    steps:
      - name: Checkout código
        uses: actions/checkout@v4
      
      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      
      - name: Executar testes unitários
        run: mvn clean test -B
      
      - name: Build da aplicação
        run: mvn clean package -DskipTests -B
      
      - name: Login no GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Preparar nome da imagem (lowercase)
        id: prep
        run: |
          GH_REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "image_name=${{ env.REGISTRY }}/${GH_REPO_LOWER}" >> $GITHUB_OUTPUT
          echo "tag=main-${{ github.sha }}" >> $GITHUB_OUTPUT
      
      - name: Build e Push da imagem Docker
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ steps.prep.outputs.image_name }}:${{ steps.prep.outputs.tag }}
            ${{ steps.prep.outputs.image_name }}:latest

  # ETAPA 2: HOMOLOGAÇÃO - Migrations e Validação
  staging-stage:
    needs: commit-stage
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: devops
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    
    steps:
      - name: Checkout código
        uses: actions/checkout@v4
      
      - name: Aguardar PostgreSQL estar pronto
        run: |
          until pg_isready -h localhost -p 5432 -U postgres; do
            echo "Aguardando PostgreSQL..."
            sleep 2
          done
        env:
          PGPASSWORD: password
      
      - name: Executar Flyway Migrations
        run: |
          docker run --rm \
            -v ${{ github.workspace }}/src/main/resources/db/migration:/flyway/sql \
            --network host \
            -e FLYWAY_URL=jdbc:postgresql://localhost:5432/devops \
            -e FLYWAY_USER=postgres \
            -e FLYWAY_PASSWORD=password \
            flyway/flyway:9.22.3 migrate
      
      - name: Validar schema do banco de dados
        run: |
          PGPASSWORD=password psql -h localhost -U postgres -d devops -c "\dt"
        env:
          PGPASSWORD: password
      
      - name: Puxar imagem do registry
        run: |
          GH_REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          docker pull ${{ env.REGISTRY }}/${GH_REPO_LOWER}:main-${{ github.sha }}

  # ETAPA 3: PRODUÇÃO - Deploy e Smoke Test
  production-stage:
    needs: staging-stage
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: devops
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    
    steps:
      - name: Checkout código
        uses: actions/checkout@v4
      
      - name: Puxar imagem do registry
        run: |
          GH_REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          docker pull ${{ env.REGISTRY }}/${GH_REPO_LOWER}:main-${{ github.sha }}
      
      - name: Executar Flyway Migrations em Produção
        run: |
          docker run --rm \
            -v ${{ github.workspace }}/src/main/resources/db/migration:/flyway/sql \
            --network host \
            -e FLYWAY_URL=jdbc:postgresql://localhost:5432/devops \
            -e FLYWAY_USER=postgres \
            -e FLYWAY_PASSWORD=password \
            flyway/flyway:9.22.3 migrate
      
      - name: Deploy - Iniciar container
        run: |
          GH_REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          docker run -d \
            --name app-container \
            --network host \
            -e SPRING_DATASOURCE_URL=jdbc:postgresql://localhost:5432/devops \
            -e SPRING_DATASOURCE_USERNAME=postgres \
            -e SPRING_DATASOURCE_PASSWORD=password \
            ${{ env.REGISTRY }}/${GH_REPO_LOWER}:main-${{ github.sha }}
      
      - name: Aguardar aplicação iniciar
        run: sleep 30
      
      - name: Smoke Test - Verificar saúde da aplicação
        run: |
          for i in {1..15}; do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/health)
            echo "Tentativa $i: HTTP $HTTP_CODE"
            if [ "$HTTP_CODE" = "200" ]; then
              echo "✓ Aplicação está saudável!"
              exit 0
            fi
            sleep 5
          done
          echo "✗ Aplicação não respondeu com status 200"
          exit 1
      
      - name: Limpar container
        if: always()
        run: docker stop app-container || true
